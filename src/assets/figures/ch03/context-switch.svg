<svg viewBox="0 0 620 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Context switch on a time axis (slides 15-16). Drawn as time-across rather than
       the deck's two-column form so the lesson is visual rather than verbal: the two
       shaded bands are intervals in which NEITHER process bar is running. That gap is
       the "pure overhead" claim, and it is why quantum size trades responsiveness
       against throughput. -->
  <defs>
    <marker id="arw-cs" markerWidth="12" markerHeight="12" refX="7" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,3.5 L0,7 Z" class="fg-arrow" />
    </marker>
  </defs>

  <!-- the two switch intervals, spanning both process rows -->
  <rect x="196" y="52" width="82" height="128" rx="8" class="fg-node-accent" opacity="0.55" />

  <rect x="392" y="52" width="82" height="128" rx="8" class="fg-node-accent" opacity="0.55" />

  <!-- process P0 row -->
  <text x="92" y="86" text-anchor="end" class="fg-text" font-size="13">process P₀</text>

  <rect x="104" y="64" width="92" height="42" rx="7" class="fg-node-strong" />

  <text x="150" y="90" text-anchor="middle" class="fg-text" font-size="12">executing</text>

  <rect x="474" y="64" width="96" height="42" rx="7" class="fg-node-strong" />

  <text x="522" y="90" text-anchor="middle" class="fg-text" font-size="12">executing</text>

  <!-- process P1 row -->
  <text x="92" y="152" text-anchor="end" class="fg-text" font-size="13">process P₁</text>

  <rect x="278" y="130" width="114" height="42" rx="7" class="fg-node-strong" />

  <text x="335" y="156" text-anchor="middle" class="fg-text" font-size="12">executing</text>

  <!-- what the kernel is doing inside each band -->
  <text x="237" y="204" text-anchor="middle" class="fg-text-muted" font-size="10.5">save PCB₀</text>

  <text x="237" y="218" text-anchor="middle" class="fg-text-muted" font-size="10.5">load PCB₁</text>

  <text x="433" y="204" text-anchor="middle" class="fg-text-muted" font-size="10.5">save PCB₁</text>

  <text x="433" y="218" text-anchor="middle" class="fg-text-muted" font-size="10.5">load PCB₀</text>

  <!-- the point of the figure -->
  <path d="M237 236 L237 254" class="fg-line" marker-end="url(#arw-cs)" />

  <path d="M433 236 L433 254" class="fg-line" marker-end="url(#arw-cs)" />

  <text x="335" y="274" text-anchor="middle" class="fg-text" font-size="12">no useful work happens here — this is pure overhead</text>

  <!-- time axis -->
  <path d="M104 40 L586 40" class="fg-line" marker-end="url(#arw-cs)" />

  <text x="592" y="44" class="fg-text-muted" font-size="11">time</text>

  <!-- the interrupt that starts each switch -->
  <text x="237" y="32" text-anchor="middle" class="fg-mono" font-size="10" fill="var(--color-text-muted)">interrupt</text>

  <text x="433" y="32" text-anchor="middle" class="fg-mono" font-size="10" fill="var(--color-text-muted)">interrupt</text>
</svg>
