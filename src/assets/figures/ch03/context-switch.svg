<svg viewBox="15 10 691 305" xmlns="http://www.w3.org/2000/svg">
  <!-- Context switch on a time axis (slides 15-16). Drawn as time-across rather than
       the deck's two-column form so the lesson is visual rather than verbal: the two
       shaded bands are intervals in which NEITHER process bar is running. That gap is
       the "pure overhead" claim, and it is why quantum size trades responsiveness
       against throughput.

       Geometry contract: the timeline tiles exactly, with no gaps and no overlaps —
         120..280  P0 executing
         280..356  switch
         356..470  P1 executing
         470..546  switch
         546..660  P0 executing
       Because the bands abut the bars instead of being drawn over them, they need no
       opacity, which is what previously muddied the strokes where the two met.

       Square corners throughout, per the site rule that TILED regions (a contiguous
       address space, a contiguous timeline) are square while DISCRETE nodes are
       rounded. Rounded corners on abutting segments pinch into lens-shaped gaps at
       every shared edge, which is most of what made this figure look choppy. -->
  <defs>
    <marker id="arw-cs" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 Z" class="fg-arrow" />
    </marker>
  </defs>

  <!-- ── time axis ─────────────────────────────────────────────────────────── -->
  <path d="M120 56 H650" class="fg-line" marker-end="url(#arw-cs)" />

  <text x="658" y="60" class="fg-text-muted" font-size="11">time</text>

  <!-- ── the two switch intervals, spanning both process rows ──────────────── -->
  <rect x="280" y="76" width="76" height="134" class="fg-node-accent" />

  <rect x="470" y="76" width="76" height="134" class="fg-node-accent" />

  <!-- Each interval starts at an interrupt: a tick dropped from the axis onto the
       band's leading edge, so the label marks an instant rather than the interval. -->
  <path d="M280 56 V76" class="fg-line" />

  <text x="280" y="44" text-anchor="middle" class="fg-mono" font-size="10" fill="var(--color-text-muted)">interrupt</text>

  <path d="M470 56 V76" class="fg-line" />

  <text x="470" y="44" text-anchor="middle" class="fg-mono" font-size="10" fill="var(--color-text-muted)">interrupt</text>

  <!-- ── process P0 row ────────────────────────────────────────────────────── -->
  <text x="108" y="116" text-anchor="end" class="fg-text" font-size="13">process P₀</text>

  <rect x="120" y="88" width="160" height="44" class="fg-node-strong" />

  <text x="200" y="116" text-anchor="middle" class="fg-text" font-size="12">executing</text>

  <rect x="546" y="88" width="114" height="44" class="fg-node-strong" />

  <text x="603" y="116" text-anchor="middle" class="fg-text" font-size="12">executing</text>

  <!-- ── process P1 row ────────────────────────────────────────────────────── -->
  <text x="108" y="182" text-anchor="end" class="fg-text" font-size="13">process P₁</text>

  <rect x="356" y="154" width="114" height="44" class="fg-node-strong" />

  <text x="413" y="182" text-anchor="middle" class="fg-text" font-size="12">executing</text>

  <!-- ── what the kernel is doing inside each band ─────────────────────────── -->
  <!-- Placed directly beneath each band and centred on it; proximity does the binding,
       which is tighter than the leader arrows this figure used to carry. -->
  <text x="318" y="232" text-anchor="middle" class="fg-text-muted" font-size="10.5">save PCB₀</text>

  <text x="318" y="248" text-anchor="middle" class="fg-text-muted" font-size="10.5">load PCB₁</text>

  <text x="508" y="232" text-anchor="middle" class="fg-text-muted" font-size="10.5">save PCB₁</text>

  <text x="508" y="248" text-anchor="middle" class="fg-text-muted" font-size="10.5">load PCB₀</text>

  <!-- the point of the figure -->
  <text x="390" y="288" text-anchor="middle" class="fg-text" font-size="12">no useful work happens here — this is pure overhead</text>
</svg>
