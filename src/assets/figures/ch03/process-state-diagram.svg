<svg viewBox="16 12 648 332" xmlns="http://www.w3.org/2000/svg">
  <!-- The five-state process diagram (slides 8-9). Two things the layout is trying
       to make unmissable: only ONE arrow enters `running` (scheduler dispatch), and
       `waiting` has no arrow to `running` at all — a woken process must go back
       through `ready` and be dispatched like everyone else.

       Geometry contract (shared by every ch03 figure): connectors are orthogonal,
       leave and enter boxes perpendicular to an edge MIDPOINT, and every endpoint
       is literally a box edge coordinate — so the numbers below can be checked by
       reading them, not by eyeballing the render. Corners are 10px quarter-arcs.
       Edge labels sit in gutters no connector passes through.

         new        x  40..160   y  36..92    cx 100  cy  64
         terminated x 520..640   y  36..92    cx 580  cy  64
         ready      x 190..314   y 150..206   cx 252  cy 178
         running    x 386..510   y 150..206   cx 448  cy 178
         waiting    x 290..410   y 264..320   cx 350  cy 292 -->
  <defs>
    <!-- refX equals the tip's own x, so the arrowhead point lands exactly on the
         path's end coordinate — that is what lets endpoints be box edges verbatim. -->
    <marker id="arw-ps" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 Z" class="fg-arrow" />
    </marker>
  </defs>

  <!-- ── states ───────────────────────────────────────────────────────────── -->
  <rect x="40" y="36" width="120" height="56" rx="10" class="fg-node" />

  <text x="100" y="70" text-anchor="middle" class="fg-text" font-size="15">new</text>

  <rect x="520" y="36" width="120" height="56" rx="10" class="fg-node" />

  <text x="580" y="70" text-anchor="middle" class="fg-text" font-size="15">terminated</text>

  <rect x="190" y="150" width="124" height="56" rx="10" class="fg-node-accent" />

  <text x="252" y="184" text-anchor="middle" class="fg-text" font-size="15">ready</text>

  <!-- running: the only state actually holding a CPU -->
  <rect x="386" y="150" width="124" height="56" rx="10" class="fg-node-accent" />

  <text x="448" y="184" text-anchor="middle" class="fg-text" font-size="15">running</text>

  <rect x="290" y="264" width="120" height="56" rx="10" class="fg-node" />

  <text x="350" y="298" text-anchor="middle" class="fg-text" font-size="15">waiting</text>

  <!-- ── transitions ──────────────────────────────────────────────────────── -->
  <!-- new -> ready : down out of new's bottom edge, right into ready's left edge -->
  <path d="M100 92 V168 Q100 178 110 178 H190" class="fg-line" marker-end="url(#arw-ps)" />

  <text x="114" y="140" class="fg-text-muted" font-size="11.5">admitted</text>

  <!-- ready -> running : the sole entrance to running -->
  <path d="M314 164 H386" class="fg-line" marker-end="url(#arw-ps)" />

  <text x="350" y="140" text-anchor="middle" class="fg-text-muted" font-size="11.5">scheduler dispatch</text>

  <!-- running -> ready : involuntary, on interrupt. Mirrors the dispatch arrow at
       the same 14px offset from the row's centre line so the pair reads as a pair. -->
  <path d="M386 192 H314" class="fg-line" marker-end="url(#arw-ps)" />

  <text x="350" y="216" text-anchor="middle" class="fg-text-muted" font-size="11.5">interrupt</text>

  <!-- running -> terminated : out of running's RIGHT edge and up into terminated's
       bottom edge. Deliberately not the top edge — leaving from the top would put this
       connector on running's centre x, the same column the I/O-wait connector leaves
       the bottom on, and the pair would read as one line skewering the box. -->
  <path d="M510 178 H570 Q580 178 580 168 V92" class="fg-line" marker-end="url(#arw-ps)" />

  <text x="592" y="136" class="fg-text-muted" font-size="11.5">exit</text>

  <!-- running -> waiting : voluntary, the process asked to block -->
  <path d="M448 206 V282 Q448 292 438 292 H410" class="fg-line" marker-end="url(#arw-ps)" />

  <text x="462" y="254" class="fg-text-muted" font-size="11.5">I/O or event wait</text>

  <!-- waiting -> ready : back into the queue, NOT straight to running -->
  <path d="M290 292 H262 Q252 292 252 282 V206" class="fg-line" marker-end="url(#arw-ps)" />

  <text x="240" y="254" text-anchor="end" class="fg-text-muted" font-size="11.5">I/O or event completion</text>
</svg>
