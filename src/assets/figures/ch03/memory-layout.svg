<svg viewBox="55 23 502 384" xmlns="http://www.w3.org/2000/svg">
  <!-- Memory layout of a C program (slides 4-5). Ordered high address at the top,
       low at the bottom, so the two arrows in the middle read literally: the stack
       grows DOWN and the heap grows UP, into the same free gap. That shared gap is
       the whole reason neither region needs a size fixed at load time.

       Geometry contract: the regions TILE a single column with square corners and
       shared edges (x 180..440; y 52/116/226/290/334/378) rather than floating as
       rounded cards inside a panel — an address space is contiguous, and the
       ch01 memory-address-space figure already establishes tiled-square as this
       site's vocabulary for one. Tiling also makes an overlap impossible to write
       by accident: each region's y is the previous one's end. -->
  <defs>
    <marker id="arw-ml" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 Z" class="fg-arrow" />
    </marker>

    <!-- Diagonal hatch marks the gap as deliberately unallocated, not just blank. -->
    <pattern id="hatch-ml" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <path d="M0,0 V8" class="fg-hatch" />
    </pattern>
  </defs>

  <!-- ── stack: grows downward from the high end ───────────────────────────── -->
  <rect x="180" y="52" width="260" height="64" class="fg-node-accent" />

  <text x="310" y="78" text-anchor="middle" class="fg-text" font-size="14">stack</text>

  <text x="310" y="96" text-anchor="middle" class="fg-text-muted" font-size="10.5">locals · parameters · return addresses</text>

  <!-- ── free space the stack and heap grow into ───────────────────────────── -->
  <rect x="180" y="116" width="260" height="110" class="fg-panel" />

  <rect x="180" y="116" width="260" height="110" fill="url(#hatch-ml)" stroke="none" />

  <!-- Arrow tips stop 11px clear of the label's cap height on both sides, so the
       connector never runs through the glyphs the way it used to. -->
  <path d="M310 130 V158" class="fg-line" marker-end="url(#arw-ml)" />

  <text x="310" y="178" text-anchor="middle" class="fg-text-muted" font-size="11.5">free space</text>

  <path d="M310 212 V190" class="fg-line" marker-end="url(#arw-ml)" />

  <!-- ── heap: grows upward ────────────────────────────────────────────────── -->
  <rect x="180" y="226" width="260" height="64" class="fg-node-accent" />

  <text x="310" y="252" text-anchor="middle" class="fg-text" font-size="14">heap</text>

  <text x="310" y="270" text-anchor="middle" class="fg-text-muted" font-size="10.5">allocated at run time</text>

  <!-- ── data: fixed size at load time ─────────────────────────────────────── -->
  <rect x="180" y="290" width="260" height="44" class="fg-node" />

  <text x="310" y="308" text-anchor="middle" class="fg-text" font-size="14">data</text>

  <text x="310" y="324" text-anchor="middle" class="fg-text-muted" font-size="10.5">global variables</text>

  <!-- ── text: the program code ────────────────────────────────────────────── -->
  <rect x="180" y="334" width="260" height="44" class="fg-node" />

  <text x="310" y="352" text-anchor="middle" class="fg-text" font-size="14">text</text>

  <text x="310" y="368" text-anchor="middle" class="fg-text-muted" font-size="10.5">program code (read-only)</text>

  <!-- ── address rail (left gutter) ────────────────────────────────────────── -->
  <text x="164" y="58" text-anchor="end" class="fg-mono" font-size="11" fill="var(--color-text-muted)">high address</text>

  <text x="164" y="378" text-anchor="end" class="fg-mono" font-size="11" fill="var(--color-text-muted)">0</text>

  <!-- ── which regions move, which are fixed (right gutter) ────────────────── -->
  <text x="456" y="88" class="fg-text-muted" font-size="10.5">grows / shrinks</text>

  <text x="456" y="262" class="fg-text-muted" font-size="10.5">grows / shrinks</text>

  <text x="456" y="316" class="fg-text-muted" font-size="10.5">fixed at load</text>

  <text x="456" y="360" class="fg-text-muted" font-size="10.5">fixed at load</text>
</svg>
