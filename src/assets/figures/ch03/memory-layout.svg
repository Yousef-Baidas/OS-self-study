<svg viewBox="0 0 520 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Memory layout of a C program (slides 4-5). Ordered high address at the top,
       low at the bottom, so the two arrows in the middle read literally: the stack
       grows DOWN and the heap grows UP, into the same free gap. That shared gap is
       the whole reason neither region needs a size fixed at load time. -->
  <defs>
    <marker id="arw-ml" markerWidth="12" markerHeight="12" refX="7" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,3.5 L0,7 Z" class="fg-arrow" />
    </marker>
  </defs>

  <!-- the process's address space -->
  <rect x="140" y="28" width="250" height="344" rx="12" class="fg-panel" />

  <!-- stack: grows downward from the high end -->
  <rect x="152" y="40" width="226" height="62" rx="8" class="fg-node-accent" />

  <text x="265" y="66" text-anchor="middle" class="fg-text" font-size="14">stack</text>

  <text x="265" y="85" text-anchor="middle" class="fg-text-muted" font-size="10.5">locals · parameters · return addresses</text>

  <!-- free space the stack and heap grow into -->
  <text x="265" y="140" text-anchor="middle" class="fg-text-muted" font-size="11.5">free space</text>

  <path d="M265 104 L265 132" class="fg-line" marker-end="url(#arw-ml)" />

  <path d="M265 196 L265 168" class="fg-line" marker-end="url(#arw-ml)" />

  <!-- heap: grows upward -->
  <rect x="152" y="200" width="226" height="62" rx="8" class="fg-node-accent" />

  <text x="265" y="226" text-anchor="middle" class="fg-text" font-size="14">heap</text>

  <text x="265" y="245" text-anchor="middle" class="fg-text-muted" font-size="10.5">allocated at run time</text>

  <!-- data: fixed size at load time -->
  <rect x="152" y="270" width="226" height="46" rx="8" class="fg-node" />

  <text x="265" y="290" text-anchor="middle" class="fg-text" font-size="14">data</text>

  <text x="265" y="307" text-anchor="middle" class="fg-text-muted" font-size="10.5">global variables</text>

  <!-- text: the program code -->
  <rect x="152" y="314" width="226" height="46" rx="8" class="fg-node" />

  <text x="265" y="334" text-anchor="middle" class="fg-text" font-size="14">text</text>

  <text x="265" y="351" text-anchor="middle" class="fg-text-muted" font-size="10.5">program code (read-only)</text>

  <!-- address rail -->
  <text x="128" y="46" text-anchor="end" class="fg-mono" font-size="11" fill="var(--color-text-muted)">high</text>

  <text x="128" y="61" text-anchor="end" class="fg-text-muted" font-size="10">address</text>

  <text x="128" y="358" text-anchor="end" class="fg-mono" font-size="11" fill="var(--color-text-muted)">0</text>

  <!-- which regions are fixed, which move -->
  <text x="402" y="72" class="fg-text-muted" font-size="10.5">grows / shrinks</text>

  <text x="402" y="234" class="fg-text-muted" font-size="10.5">grows / shrinks</text>

  <text x="402" y="294" class="fg-text-muted" font-size="10.5">fixed at load</text>

  <text x="402" y="338" class="fg-text-muted" font-size="10.5">fixed at load</text>
</svg>
