<svg viewBox="0 0 340 420" xmlns="http://www.w3.org/2000/svg">
  <!-- A single memory address space from 0 (top) to 512M (bottom), divided between
       the operating system and four concurrently loaded jobs. -->
  <defs>
    <marker id="arw-mem" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,3 L0,6 Z" class="fg-arrow" />
    </marker>
  </defs>

  <!-- regions -->
  <rect x="120" y="30" width="180" height="72" class="fg-node-accent" />

  <text x="210" y="70" text-anchor="middle" class="fg-text" font-size="14">Operating system</text>

  <rect x="120" y="102" width="180" height="72" class="fg-node" />

  <text x="210" y="142" text-anchor="middle" class="fg-text" font-size="14">Job 1</text>

  <rect x="120" y="174" width="180" height="72" class="fg-node" />

  <text x="210" y="214" text-anchor="middle" class="fg-text" font-size="14">Job 2</text>

  <rect x="120" y="246" width="180" height="72" class="fg-node" />

  <text x="210" y="286" text-anchor="middle" class="fg-text" font-size="14">Job 3</text>

  <rect x="120" y="318" width="180" height="72" class="fg-node" />

  <text x="210" y="358" text-anchor="middle" class="fg-text" font-size="14">Job 4</text>

  <!-- address labels -->
  <text x="104" y="35" text-anchor="end" class="fg-mono" font-size="12" fill="var(--color-text-muted)">0</text>

  <text x="104" y="393" text-anchor="end" class="fg-mono" font-size="12" fill="var(--color-text-muted)">512M</text>

  <!-- increasing-address cue -->
  <line x1="316" y1="40" x2="316" y2="380" class="fg-line" marker-end="url(#arw-mem)" />

  <text x="332" y="210" text-anchor="middle" class="fg-mono" font-size="10" fill="var(--color-text-muted)" transform="rotate(90 332 210)">address</text>
</svg>
