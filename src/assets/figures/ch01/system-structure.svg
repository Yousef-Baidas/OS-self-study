<svg viewBox="0 0 520 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Four layered bands: users on top, hardware at the bottom, the OS as the
       coordinating layer highlighted in the accent. -->
  <g>
    <rect x="90" y="28" width="340" height="50" rx="10" class="fg-node-strong" />

    <text x="260" y="49" text-anchor="middle" class="fg-text" font-size="16">Users</text>

    <text x="260" y="67" text-anchor="middle" class="fg-text-muted" font-size="11.5">people · machines · other programs</text>
  </g>

  <g>
    <rect x="90" y="90" width="340" height="50" rx="10" class="fg-node" />

    <text x="260" y="120" text-anchor="middle" class="fg-text" font-size="15">Application &amp; system programs</text>
  </g>

  <g>
    <rect x="90" y="152" width="340" height="50" rx="10" class="fg-node-accent" />

    <text x="260" y="182" text-anchor="middle" class="fg-text" font-size="16">Operating system</text>
  </g>

  <g>
    <rect x="90" y="214" width="340" height="50" rx="10" class="fg-node-strong" />

    <text x="260" y="235" text-anchor="middle" class="fg-text" font-size="16">Computer hardware</text>

    <text x="260" y="253" text-anchor="middle" class="fg-text-muted" font-size="11.5">CPU · memory · I/O devices</text>
  </g>

  <!-- "sits on top of" cue down the left edge -->
  <g>
    <line x1="60" y1="40" x2="60" y2="252" class="fg-line" marker-end="url(#arw-sys)" />

    <text x="46" y="150" text-anchor="middle" class="fg-mono" font-size="10" fill="var(--color-text-muted)" transform="rotate(-90 46 150)">relies on</text>
  </g>

  <defs>
    <marker id="arw-sys" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,3 L0,6 Z" class="fg-arrow" />
    </marker>
  </defs>
</svg>
