<svg viewBox="0 0 580 300" xmlns="http://www.w3.org/2000/svg">
  <!-- CPU and device controllers hang off a shared system bus; memory sits below
       it. Real devices sit above their controllers. -->
  <defs>
    <marker id="arw-org" markerWidth="10" markerHeight="10" refX="4" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,3 L0,6 Z" class="fg-arrow" />
    </marker>
  </defs>

  <!-- Devices (above controllers) -->
  <g>
    <rect x="176" y="20" width="104" height="30" rx="7" class="fg-node" />

    <text x="228" y="40" text-anchor="middle" class="fg-text-muted" font-size="12">Disk</text>

    <rect x="306" y="20" width="104" height="30" rx="7" class="fg-node" />

    <text x="358" y="40" text-anchor="middle" class="fg-text-muted" font-size="12">Keyboard</text>

    <rect x="436" y="20" width="104" height="30" rx="7" class="fg-node" />

    <text x="488" y="40" text-anchor="middle" class="fg-text-muted" font-size="12">Monitor</text>
  </g>

  <!-- device -> controller links -->
  <line x1="228" y1="50" x2="228" y2="84" class="fg-line" />

  <line x1="358" y1="50" x2="358" y2="84" class="fg-line" />

  <line x1="488" y1="50" x2="488" y2="84" class="fg-line" />

  <!-- CPU + controllers -->
  <g>
    <rect x="46" y="84" width="104" height="54" rx="10" class="fg-node-accent" />

    <text x="98" y="116" text-anchor="middle" class="fg-text" font-size="16">CPU</text>

    <rect x="176" y="84" width="104" height="54" rx="10" class="fg-node" />

    <text x="228" y="110" text-anchor="middle" class="fg-text" font-size="12.5">Disk</text>

    <text x="228" y="126" text-anchor="middle" class="fg-text" font-size="12.5">controller</text>

    <rect x="306" y="84" width="104" height="54" rx="10" class="fg-node" />

    <text x="358" y="110" text-anchor="middle" class="fg-text" font-size="12.5">USB</text>

    <text x="358" y="126" text-anchor="middle" class="fg-text" font-size="12.5">controller</text>

    <rect x="436" y="84" width="104" height="54" rx="10" class="fg-node" />

    <text x="488" y="110" text-anchor="middle" class="fg-text" font-size="12.5">Graphics</text>

    <text x="488" y="126" text-anchor="middle" class="fg-text" font-size="12.5">adapter</text>
  </g>

  <!-- box -> bus links -->
  <line x1="98" y1="138" x2="98" y2="168" class="fg-line" />

  <line x1="228" y1="138" x2="228" y2="168" class="fg-line" />

  <line x1="358" y1="138" x2="358" y2="168" class="fg-line" />

  <line x1="488" y1="138" x2="488" y2="168" class="fg-line" />

  <!-- shared system bus -->
  <rect x="40" y="168" width="500" height="26" rx="6" class="fg-bus" />

  <text x="290" y="185" text-anchor="middle" class="fg-mono" font-size="12" fill="var(--color-text)">system bus</text>

  <!-- bus -> memory -->
  <line x1="290" y1="194" x2="290" y2="224" class="fg-line" marker-end="url(#arw-org)" />

  <rect x="210" y="224" width="160" height="54" rx="10" class="fg-node-strong" />

  <text x="290" y="256" text-anchor="middle" class="fg-text" font-size="16">Memory</text>
</svg>
