<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 360" role="img" aria-labelledby="memory-address-space-title">
  <title id="memory-address-space-title">Memory address space: operating system and four jobs from 0 to 512M</title>
  <desc>A vertical memory address space starting at 0, holding the operating system at the low end, followed by job 1 through job 4, ending at 512M.</desc>
  <style>
    /* light (default) — mirrors tokens.css :root */
    .box     { fill: #f1f5f9; stroke: #e2e8f0; stroke-width: 1.5; }      /* --color-surface / --color-border */
    .box--accent { fill: #4f46e5; stroke: #4338ca; }                     /* --color-accent / --color-accent-hover */
    .label   { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 14px; font-weight: 600; fill: #0f172a; } /* --color-text */
    .label--on-accent { fill: #ffffff; }
    .caption { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 12px; fill: #64748b; } /* --color-text-muted */
    .arrow   { stroke: #64748b; stroke-width: 1.5; fill: none; }

    /* additions beyond the locked template — same token set, new roles this figure needs */
    .box--raised { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; }  /* --color-surface-raised / --color-border */

    @media (prefers-color-scheme: dark) {
      .box     { fill: #1e293b; stroke: #334155; }                       /* --color-surface / --color-border (dark) */
      .box--accent { fill: #6366f1; stroke: #818cf8; }                   /* --color-accent / --color-accent-hover (dark) */
      .label   { fill: #f1f5f9; }                                        /* --color-text (dark) */
      .caption { fill: #94a3b8; }                                        /* --color-text-muted (dark) */
      .arrow   { stroke: #94a3b8; }
      .box--raised { fill: #24334a; stroke: #334155; }                   /* --color-surface-raised / --color-border (dark) */
    }
  </style>

  <!-- address-space stack, low address (0) at top -->
  <rect class="box--raised" x="70" y="20" width="140" height="60" rx="4" />
  <text class="label" x="140" y="55" text-anchor="middle">operating system</text>

  <rect class="box" x="70" y="80" width="140" height="64" rx="4" />
  <text class="label" x="140" y="116" text-anchor="middle">job 1</text>

  <rect class="box" x="70" y="144" width="140" height="64" rx="4" />
  <text class="label" x="140" y="180" text-anchor="middle">job 2</text>

  <rect class="box" x="70" y="208" width="140" height="64" rx="4" />
  <text class="label" x="140" y="244" text-anchor="middle">job 3</text>

  <rect class="box" x="70" y="272" width="140" height="64" rx="4" />
  <text class="label" x="140" y="308" text-anchor="middle">job 4</text>

  <!-- address boundary ticks + labels -->
  <line class="arrow" x1="60" y1="20" x2="70" y2="20" />
  <text class="label" x="55" y="25" text-anchor="end">0</text>

  <line class="arrow" x1="60" y1="336" x2="70" y2="336" />
  <text class="label" x="55" y="341" text-anchor="end">512M</text>
</svg>
