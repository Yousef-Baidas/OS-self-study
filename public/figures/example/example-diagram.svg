<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="diagram-title">
  <title id="diagram-title">Storage hierarchy: CPU registers, main memory, and disk, fastest and smallest at the top</title>

  <style>
    .box { fill: #f1f5f9; stroke: #e2e8f0; stroke-width: 1.5; }
    .box--accent { fill: #4f46e5; stroke: #4338ca; }
    .label { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 14px; font-weight: 600; fill: #0f172a; }
    .label--on-accent { fill: #ffffff; }
    .caption { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 12px; fill: #64748b; }
    .arrow { stroke: #64748b; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b" />
    </marker>
  </defs>

  <!-- CPU registers -->
  <rect class="box box--accent" x="20" y="20" width="160" height="50" rx="4" />
  <text class="label label--on-accent" x="100" y="50" text-anchor="middle">CPU Registers</text>
  <text class="caption" x="100" y="88" text-anchor="middle">fastest, smallest</text>

  <!-- Main memory -->
  <rect class="box" x="220" y="20" width="160" height="50" rx="4" />
  <text class="label" x="300" y="50" text-anchor="middle">Main Memory</text>
  <text class="caption" x="300" y="88" text-anchor="middle">RAM</text>

  <!-- Disk -->
  <rect class="box" x="420" y="20" width="160" height="50" rx="4" />
  <text class="label" x="500" y="50" text-anchor="middle">Disk</text>
  <text class="caption" x="500" y="88" text-anchor="middle">slowest, largest</text>

  <!-- Arrows -->
  <path class="arrow" d="M180,45 L216,45" />
  <path class="arrow" d="M380,45 L416,45" />

  <text class="caption" x="300" y="140" text-anchor="middle">Speed and cost decrease left to right; capacity increases</text>
</svg>
